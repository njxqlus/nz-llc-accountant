services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nz_llc_accountant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nz_llc_accountant
      JEAN_CLAUDE_BUN_DAM_SERVER_URL: ${JEAN_CLAUDE_BUN_DAM_SERVER_URL}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
